[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npx prisma migrate resolve --applied 20260408153542_sync_demo_engagement_schema && npx prisma migrate deploy && node dist/src/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
numReplicas = 1
