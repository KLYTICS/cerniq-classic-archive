name: Swarm Guards

on:
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets in diff
        run: |
          # Match secret VALUES (high-entropy tokens), not var NAMES.
          # Previously this regex matched on `ANTHROPIC_API`, `STRIPE_SECRET`,
          # etc. — which flagged every test, schema, type, or comment that
          # referenced the var by name. The scanner had zero signal on a
          # PR touching anything agent-adjacent. Real patterns below catch
          # actual credentials that would leak if committed.
          SECRETS=$(git diff origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.mjs' '*.py' '*.json' '*.yml' '*.yaml' | \
            grep -iE '(\bsk-ant-[a-zA-Z0-9_-]{20,}|\bsk_live_[a-zA-Z0-9]{20,}|\bsk_test_[a-zA-Z0-9]{20,}|\bwhsec_[a-zA-Z0-9]{20,}|\bre_[a-zA-Z0-9]{20,}|\bAKIA[0-9A-Z]{16}|postgres://[^:@/]+:[^@]{8,}@|password\s*=\s*["\x27][^"\x27]{8,}["\x27])' || true)
          # Filter obvious test literals so spec fixtures like 'sk-ant-test'
          # don't trip the gate (pattern requires {20,} char tokens anyway,
          # but belt-and-suspenders for anything matching the prefix).
          SECRETS=$(echo "$SECRETS" | grep -iv 'sk-ant-test\|sk_test_test\|whsec_test\|re_test' || true)
          if [ -n "$SECRETS" ]; then
            echo "::error::High-entropy secret value detected in PR diff"
            echo "$SECRETS" | head -10
            exit 1
          fi
          echo "No secrets found"

  scope-audit:
    name: Scope Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git diff origin/main...HEAD` resolves the
          # merge-base. Without this, checkout is a shallow clone and
          # the diff bombs with `fatal: ambiguous argument 'origin/main'`.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: List changed files
        id: changes
        run: |
          FILES=$(git diff --name-only origin/main...HEAD)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "count=$(echo "$FILES" | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
      - name: Validate registry
        run: node -e "JSON.parse(require('fs').readFileSync('scripts/swarm/registry.json','utf8')); console.log('Registry valid')"
      - name: Report scope coverage
        run: |
          echo "## Scope Audit" >> $GITHUB_STEP_SUMMARY
          echo "**${{ steps.changes.outputs.count }} files changed**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.changes.outputs.files }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  financial-decimal-check:
    name: Financial Decimal Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # D22 Wave-3 rework. Two changes from the prior guard:
      #
      # 1) Extended scope. The old scope (alm/, reports/, compliance/)
      #    missed CPA, Expenses, Realtime-ALM, Pipeline, AI ingest —
      #    all modules that ingest user-supplied numeric data. D21
      #    (silent-accept parseFloat on CPA balance) slipped through
      #    because CPA wasn't scanned.
      #
      # 2) Narrowed regex. The old pattern matched `\b(number|float|
      #    parseFloat|toFixed)\b` — which flagged every `number` type
      #    annotation in TypeScript, producing hundreds of false
      #    positives that trained contributors to ignore the guard.
      #    New pattern matches only unsafe call sites:
      #      parseFloat(   — the banned idiom
      #    Allowlisting `parseFinancialField` (the safe replacement)
      #    via the grep -v filter on 'parseFinancialField' so future
      #    refactors don't re-flag the migrated call sites.
      #
      # Wave-3 policy: guard remains warning-only (`|| true` keeps
      # step exit 0). Wave-4 promotes to blocking once the remaining
      # 13 non-ALM parseFloat sites (expenses, realtime-alm API feeds,
      # ai/ingest NL extraction) are migrated.
      - name: Check for Float in financial code
        run: |
          VIOLATIONS=$(git diff origin/main...HEAD -- \
            'backend-node/src/alm/**' \
            'backend-node/src/reports/**' \
            'backend-node/src/compliance/**' \
            'backend-node/src/cpa/**' \
            'backend-node/src/expenses/**' \
            'backend-node/src/realtime-alm/**' \
            'backend-node/src/pipeline/**' \
            'backend-node/src/ai/ingest/**' | \
            grep -n '^\+.*\bparseFloat\s*(' | \
            grep -iv 'parseFinancialField\|test\|spec\|\.d\.ts\|heuristic' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::warning::Unsafe parseFloat in financial ingest code — use parseFinancialField from common/utils/financial-field.ts:"
            echo "$VIOLATIONS" | head -10
          fi
          echo "Financial decimal check complete"
