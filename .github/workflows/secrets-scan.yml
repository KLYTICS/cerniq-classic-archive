name: Secrets Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Daily full-history scan catches secrets on long-lived feature branches
  # that never get PR'd, and any tokens added via direct push.
  schedule:
    - cron: '30 8 * * *'  # 04:30 AST / 08:30 UTC daily
  workflow_dispatch:

# Cancel in-flight scans of the same PR to save CI minutes.
concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # posting a summary comment on PRs

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history for scheduled scan)
        uses: actions/checkout@v6
        with:
          # PR scans only need the PR diff; scheduled scans need all history
          fetch-depth: ${{ github.event_name == 'schedule' && 0 || 1 }}

      # gitleaks-action@v2 now requires GITLEAKS_LICENSE for any GitHub
      # organization (including single-developer orgs), which we don't have.
      # Use the OSS gitleaks binary directly — same scanner, same .gitleaks.toml
      # config, no licensing wall.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        id: gitleaks
        run: |
          set -o pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR mode: only the commits introduced by this PR
            gitleaks detect \
              --config .gitleaks.toml \
              --redact -v \
              --log-opts="--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --report-format sarif \
              --report-path results.sarif \
              --exit-code 1
          else
            # Push / schedule / dispatch: full history
            gitleaks detect \
              --config .gitleaks.toml \
              --redact -v \
              --report-format sarif \
              --report-path results.sarif \
              --exit-code 1
          fi

      - name: Upload SARIF to Security tab
        # Upload even on a clean run so GitHub knows the scan completed.
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks
        continue-on-error: true   # SARIF upload requires Advanced Security on private repos

      - name: Comment on PR if findings
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- secrets-scan-summary -->';
            const body = `${marker}\n## 🚨 Secrets Scan — potential leak detected\n\n` +
              `gitleaks found one or more patterns that match secret-shaped strings in this PR.\n\n` +
              `**Do not merge** until you've either:\n` +
              `1. Confirmed it's a false positive and added it to \`.gitleaks.toml\` \`[allowlist]\`, OR\n` +
              `2. Rotated the leaked secret (see \`docs/ops/SECRETS_ROTATION.md\`) AND scrubbed it from history (\`scripts/ops/git-history-cleanup.sh\`)\n\n` +
              `See the workflow summary and SARIF artifact for exact file/line locations.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
