name: CERNIQ CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  TEST_DATABASE_URL: postgresql://test:test@localhost:5432/cerniq_test
  CI_REDIS_URL: redis://localhost:6379
  CI_JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
  CI_BUILD_JWT_SECRET: ci-build-secret-must-be-at-least-32-characters-long
  FRONTEND_API_URL: http://localhost:3000
  PLAYWRIGHT_BACKEND_URL: http://localhost:43100

jobs:
  # Surfaces presence of optional secrets via job outputs so downstream
  # job-level `if:` can gate on them. Direct `secrets.*` references in
  # job-level `if:` are rejected by GHA at parse time (only env, vars,
  # github contexts are allowed there) — every push to this branch was
  # showing as a 0-second "workflow file issue" failure until this was
  # hoisted into a check-secrets job.
  check-secrets:
    name: Check optional secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_apple_team: ${{ steps.check.outputs.has_apple_team }}
    steps:
      - id: check
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          if [ -n "${APPLE_DEVELOPMENT_TEAM:-}" ]; then
            echo "has_apple_team=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apple_team=false" >> "$GITHUB_OUTPUT"
          fi

  apple-foundation:
    name: Apple Foundation
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # apple/Package.swift declares `// swift-tools-version: 6.3` which
      # requires Xcode 16+. The macos-14 runner defaults to Xcode 15.x
      # (Swift 5.10) so swift build fails at the toolchain check. Pin the
      # newest stable Xcode the runner image has installed.
      - name: Select latest stable Xcode (Swift 6.3 tools)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Verify Apple foundation
        run: bash scripts/apple/verify.sh

      - name: Verify clean worktree
        run: bash scripts/verify-clean-worktree.sh

  apple-release-dry-run:
    name: Apple Release Dry Run
    needs: [apple-foundation, check-secrets]
    if: needs.check-secrets.outputs.has_apple_team == 'true'
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Apple release lane
        run: npm run archive:apple -- --dry-run --export
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Verify clean worktree
        run: bash scripts/verify-clean-worktree.sh

  # Secrets scanning — blocks merge if credentials detected
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # gitleaks-action calls GET /pulls/:n/commits to list PR commits,
    # which requires `pull-requests: read` on the job token. Without
    # this explicit block, the default GITHUB_TOKEN has `contents:
    # read` only for PRs from forks, so the action fails with
    # `403 Resource not accessible by integration`. Granting read on
    # both contents and pull-requests at the job level scopes the
    # permissions tightly (gitleaks can read refs + list PR commits
    # but cannot write anything back to the repo).
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # gitleaks-action@v2 now requires GITLEAKS_LICENSE for any GitHub
      # organization (incl. solo-dev orgs like KLYTICS) and was failing
      # silently before any scan ran. Swap for OSS binary — same scanner,
      # same .gitleaks.toml config. Matches the pattern in secrets-scan.yml.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          set -o pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            gitleaks detect \
              --config .gitleaks.toml \
              --redact -v \
              --log-opts="--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --report-format sarif \
              --report-path results.sarif \
              --exit-code 1
          else
            gitleaks detect \
              --config .gitleaks.toml \
              --redact -v \
              --report-format sarif \
              --report-path results.sarif \
              --exit-code 1
          fi

  # Backend NestJS — lint, test, build
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cerniq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup backend workspace
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: backend-node/package-lock.json
          working-directory: backend-node

      - name: Generate Prisma client
        working-directory: backend-node
        run: npx prisma generate

      - name: Push schema to test database
        working-directory: backend-node
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Validate Prisma schema
        working-directory: backend-node
        run: npx prisma validate

      # Security audit — fail the build on any HIGH or CRITICAL CVE in
      # production dependencies (`--omit=dev` excludes devDependencies,
      # which don't ship to Railway). Previously ran with
      # `--audit-level=critical || true`, which silently passed even
      # when CRITICAL findings existed (12 CVEs hidden at audit time
      # 2026-04-17 — fixed by `npm audit fix` in the same commit).
      # MODERATE findings still pass so transitive upgrades that need
      # breaking-change `npm audit fix --force` don't block deploys;
      # track them in a follow-up issue instead.
      - name: Security audit
        working-directory: backend-node
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        working-directory: backend-node
        run: npm run lint

      - name: Unit tests
        working-directory: backend-node
        run: npm run test -- --forceExit
        env:
          REDIS_URL: ${{ env.CI_REDIS_URL }}
          JWT_SECRET: ${{ env.CI_JWT_SECRET }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Build
        working-directory: backend-node
        run: npm run build
        env:
          JWT_SECRET: ${{ env.CI_BUILD_JWT_SECRET }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Verify clean worktree
        run: bash scripts/verify-clean-worktree.sh

  # Frontend Next.js — lint, build
  frontend-test:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup frontend workspace
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend/package-lock.json
          working-directory: frontend

      # Security audit — see backend-test for rationale. Tightened from
      # `--audit-level=critical || true` to `--audit-level=high` so
      # HIGH CVEs block the deploy instead of silently passing.
      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_NODE_API_URL: ${{ env.FRONTEND_API_URL }}
          NEXT_PUBLIC_API_URL: ${{ env.FRONTEND_API_URL }}

      - name: Run component tests
        working-directory: frontend
        run: npx vitest run

      # Bundle size budget — fails the build if total raw JS > 10MB or
      # any single chunk > 1.5MB. Enforces the TTFB < 800ms SLO target.
      # See scripts/ci/check-bundle-size.mjs for tuning rationale +
      # top-5-chunk breakdown. Replaced the prior warning-only 20MB
      # ceiling which silently allowed regressions.
      - name: Bundle size check
        run: node scripts/ci/check-bundle-size.mjs

      - name: Verify clean worktree
        run: bash scripts/verify-clean-worktree.sh

  backend-e2e:
    name: Backend E2E & Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-test]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cerniq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup backend workspace
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: backend-node/package-lock.json
          working-directory: backend-node

      - name: Generate Prisma client
        working-directory: backend-node
        run: npx prisma generate

      - name: Push schema to test database
        working-directory: backend-node
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Run backend E2E & security suites
        working-directory: backend-node
        run: npx jest --config ./test/jest-e2e.json --runInBand
        env:
          REDIS_URL: ${{ env.CI_REDIS_URL }}
          JWT_SECRET: ${{ env.CI_JWT_SECRET }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Verify clean worktree
        run: bash scripts/verify-clean-worktree.sh

  # Outbound Python engine — lint, test
  outbound-test:
    name: Outbound Engine Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup outbound workspace
        uses: ./.github/actions/setup-python-project
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-path: services/outbound/requirements.txt
          working-directory: services/outbound

      - name: Run tests
        working-directory: services/outbound
        env:
          # services/outbound/config.py:24 calls _require_env("OUTBOUND_DATABASE_URL")
          # at module-import time (class-body assignment, not lazy). Without
          # this, every test module fails at collection with `RuntimeError:
          # OUTBOUND_DATABASE_URL is required.` — interrupting all 5 test
          # files before any assertion runs. Placeholder URL is enough; these
          # tests don't reach a real DB. Long-term fix: refactor Config to
          # pydantic BaseSettings (lazy init) so imports succeed without env.
          OUTBOUND_DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: python -m pytest tests/ -v --tb=short

      - name: Verify clean worktree
        run: bash scripts/verify-clean-worktree.sh

  # COSSEC PDF parser — Phase-1.6 FastAPI microservice with 32 pytest
  # tests covering PyMuPDF extraction, Spanish regex for Hallazgo N°X
  # headers, CAMEL+S severity mapping, SHA-256 dedup, and Pydantic v2
  # response shapes. Running these in CI guards against regressions in
  # the PDF ingest pipeline that downstream ALM alerts depend on.
  cossec-parser-test:
    name: COSSEC Parser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup cossec-parser workspace
        uses: ./.github/actions/setup-python-project
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-path: services/cossec-parser/requirements.txt
          working-directory: services/cossec-parser

      - name: Run tests
        working-directory: services/cossec-parser
        run: python -m pytest tests/ -v --tb=short

      - name: Verify clean worktree
        run: bash scripts/verify-clean-worktree.sh

  # Deploy Backend to Railway (main branch only)
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [release-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend-node
        run: railway up --ci --service "${{ vars.RAILWAY_SERVICE_ID }}" --environment "${{ vars.RAILWAY_ENVIRONMENT_NAME }}" --project "${{ vars.RAILWAY_PROJECT_ID }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # Frontend E2E tests with Playwright
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cerniq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup frontend workspace
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend/package-lock.json
          working-directory: frontend

      - name: Setup backend workspace
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: backend-node/package-lock.json
          working-directory: backend-node

      - name: Generate Prisma client
        working-directory: backend-node
        run: npx prisma generate

      - name: Push schema to test database
        working-directory: backend-node
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Build backend
        working-directory: backend-node
        run: npm run build
        env:
          JWT_SECRET: ${{ env.CI_BUILD_JWT_SECRET }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_NODE_API_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3100

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=github
        env:
          CI: true
          PLAYWRIGHT_BACKEND_URL: http://127.0.0.1:3100
          PLAYWRIGHT_BACKEND_COMMAND: cd ../backend-node && PORT=3100 BACKEND_PORT=3100 npm run start:prod
          PLAYWRIGHT_FRONTEND_COMMAND: ENABLE_ADMIN=1 NEXT_PUBLIC_NODE_API_URL=http://127.0.0.1:3100 NEXT_PUBLIC_API_URL=http://127.0.0.1:3100 npx next start --port 3101
          NEXT_PUBLIC_NODE_API_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3100
          REDIS_URL: ${{ env.CI_REDIS_URL }}
          JWT_SECRET: ${{ env.CI_JWT_SECRET }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Verify clean worktree
        run: bash scripts/verify-clean-worktree.sh

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - secrets-scan
      - backend-test
      - backend-e2e
      - frontend-test
      - frontend-e2e
      - outbound-test
      - cossec-parser-test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Confirm release baseline
        run: |
          echo "Release integrity baseline passed."
          echo "If GitHub Actions billing is suspended, remote runs may still remain red before jobs start."

  # Frontend deploys via Vercel GitHub integration
  deploy-frontend:
    name: Frontend Deploy (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [release-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Confirm Vercel integration
        run: echo "Production frontend deployments are triggered by Vercel GitHub integration."
