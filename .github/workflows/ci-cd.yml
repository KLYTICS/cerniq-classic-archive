name: CERNIQ CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # Backend NestJS — lint, test, build
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cerniq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend-node/node_modules
          key: ${{ runner.os }}-backend-node-modules-${{ hashFiles('backend-node/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-node-modules-

      - name: Install dependencies
        working-directory: backend-node
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        working-directory: backend-node
        run: npx prisma generate

      - name: Push schema to test database
        working-directory: backend-node
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cerniq_test

      - name: Validate Prisma schema
        working-directory: backend-node
        run: npx prisma validate

      - name: Security audit
        working-directory: backend-node
        run: npm audit --audit-level=critical --omit=dev || true

      - name: Lint
        working-directory: backend-node
        run: npm run lint

      - name: Unit tests
        working-directory: backend-node
        run: npm run test -- --forceExit
        env:
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/cerniq_test

      - name: Build
        working-directory: backend-node
        run: npm run build
        env:
          JWT_SECRET: ci-build-secret-must-be-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/cerniq_test

  # Frontend Next.js — lint, build
  frontend-test:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=critical --omit=dev || true

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # Deploy Backend to Railway (main branch only)
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend-node
        run: railway up --ci --service "${{ vars.RAILWAY_SERVICE_ID }}" --environment "${{ vars.RAILWAY_ENVIRONMENT_NAME }}" --project "${{ vars.RAILWAY_PROJECT_ID }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # Frontend E2E tests with Playwright
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-test]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=github
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # Frontend deploys via Vercel GitHub integration
  deploy-frontend:
    name: Frontend Deploy (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Confirm Vercel integration
        run: echo "Production frontend deployments are triggered by Vercel GitHub integration."
