name: CERNIQ CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  TEST_DATABASE_URL: postgresql://test:test@localhost:5432/cerniq_test
  CI_REDIS_URL: redis://localhost:6379
  CI_JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
  CI_BUILD_JWT_SECRET: ci-build-secret-must-be-at-least-32-characters-long
  FRONTEND_API_URL: http://localhost:3000
  PLAYWRIGHT_BACKEND_URL: http://localhost:43100

jobs:
  # Backend NestJS — lint, test, build
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cerniq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup backend workspace
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: backend-node/package-lock.json
          working-directory: backend-node

      - name: Generate Prisma client
        working-directory: backend-node
        run: npx prisma generate

      - name: Push schema to test database
        working-directory: backend-node
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Validate Prisma schema
        working-directory: backend-node
        run: npx prisma validate

      - name: Security audit
        working-directory: backend-node
        run: npm audit --audit-level=critical --omit=dev || true

      - name: Lint
        working-directory: backend-node
        run: npm run lint

      - name: Unit tests
        working-directory: backend-node
        run: npm run test -- --forceExit
        env:
          REDIS_URL: ${{ env.CI_REDIS_URL }}
          JWT_SECRET: ${{ env.CI_JWT_SECRET }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Build
        working-directory: backend-node
        run: npm run build
        env:
          JWT_SECRET: ${{ env.CI_BUILD_JWT_SECRET }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

  # Frontend Next.js — lint, build
  frontend-test:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup frontend workspace
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend/package-lock.json
          working-directory: frontend

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=critical --omit=dev || true

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_NODE_API_URL: ${{ env.FRONTEND_API_URL }}
          NEXT_PUBLIC_API_URL: ${{ env.FRONTEND_API_URL }}

      - name: Run component tests
        working-directory: frontend
        run: npx vitest run

      - name: Bundle size check
        working-directory: frontend
        run: |
          # Check that First Load JS stays under 200KB budget
          FIRST_LOAD=$(du -sb .next/static/chunks/ | cut -f1)
          BUDGET=20000000  # 20MB total chunks budget
          echo "Total chunk size: $(du -sh .next/static/chunks/ | cut -f1)"
          if [ "$FIRST_LOAD" -gt "$BUDGET" ]; then
            echo "::warning::Bundle size ($FIRST_LOAD bytes) exceeds budget ($BUDGET bytes)"
          fi

  backend-e2e:
    name: Backend E2E & Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-test]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cerniq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup backend workspace
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: backend-node/package-lock.json
          working-directory: backend-node

      - name: Generate Prisma client
        working-directory: backend-node
        run: npx prisma generate

      - name: Push schema to test database
        working-directory: backend-node
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Run backend E2E & security suites
        working-directory: backend-node
        run: npx jest --config ./test/jest-e2e.json --runInBand
        env:
          REDIS_URL: ${{ env.CI_REDIS_URL }}
          JWT_SECRET: ${{ env.CI_JWT_SECRET }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

  # Outbound Python engine — lint, test
  outbound-test:
    name: Outbound Engine Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup outbound workspace
        uses: ./.github/actions/setup-python-project
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-path: services/outbound/requirements.txt
          working-directory: services/outbound

      - name: Run tests
        working-directory: services/outbound
        run: python -m pytest tests/ -v --tb=short

  # Deploy Backend to Railway (main branch only)
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [release-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend-node
        run: railway up --ci --service "${{ vars.RAILWAY_SERVICE_ID }}" --environment "${{ vars.RAILWAY_ENVIRONMENT_NAME }}" --project "${{ vars.RAILWAY_PROJECT_ID }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # Frontend E2E tests with Playwright
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cerniq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup frontend workspace
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend/package-lock.json
          working-directory: frontend

      - name: Setup backend workspace
        uses: ./.github/actions/setup-node-project
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: backend-node/package-lock.json
          working-directory: backend-node

      - name: Generate Prisma client
        working-directory: backend-node
        run: npx prisma generate

      - name: Push schema to test database
        working-directory: backend-node
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Build backend
        working-directory: backend-node
        run: npm run build
        env:
          JWT_SECRET: ${{ env.CI_BUILD_JWT_SECRET }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_NODE_API_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3100

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=github
        env:
          CI: true
          PLAYWRIGHT_BACKEND_URL: http://127.0.0.1:3100
          PLAYWRIGHT_BACKEND_COMMAND: cd ../backend-node && PORT=3100 BACKEND_PORT=3100 npm run start:prod
          PLAYWRIGHT_FRONTEND_COMMAND: NEXT_PUBLIC_NODE_API_URL=http://127.0.0.1:3100 NEXT_PUBLIC_API_URL=http://127.0.0.1:3100 npx next start --port 3101
          NEXT_PUBLIC_NODE_API_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3100
          REDIS_URL: ${{ env.CI_REDIS_URL }}
          JWT_SECRET: ${{ env.CI_JWT_SECRET }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - backend-test
      - backend-e2e
      - frontend-test
      - frontend-e2e
      - outbound-test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Confirm release baseline
        run: |
          echo "Release integrity baseline passed."
          echo "If GitHub Actions billing is suspended, remote runs may still remain red before jobs start."

  # Frontend deploys via Vercel GitHub integration
  deploy-frontend:
    name: Frontend Deploy (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [release-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Confirm Vercel integration
        run: echo "Production frontend deployments are triggered by Vercel GitHub integration."
