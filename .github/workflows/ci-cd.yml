name: CERNIQ CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # Backend NestJS — lint, test, build
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json

      - name: Install dependencies
        working-directory: backend-node
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        working-directory: backend-node
        run: npx prisma generate

      - name: Validate Prisma schema
        working-directory: backend-node
        run: npx prisma validate

      - name: Lint
        working-directory: backend-node
        run: npm run lint

      - name: Unit tests
        working-directory: backend-node
        run: npm run test -- --forceExit
        env:
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Build
        working-directory: backend-node
        run: npm run build
        env:
          JWT_SECRET: ci-build-secret-must-be-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  # Frontend Next.js — lint, build
  frontend-test:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # Deploy Backend to Railway (main branch only)
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend-node
        run: railway up --ci --service "${{ vars.RAILWAY_SERVICE_ID }}" --environment "${{ vars.RAILWAY_ENVIRONMENT_NAME }}" --project "${{ vars.RAILWAY_PROJECT_ID }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # Frontend deploys via Vercel GitHub integration
  deploy-frontend:
    name: Frontend Deploy (Vercel)
    runs-on: ubuntu-latest
    needs: [frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Confirm Vercel integration
        run: echo "Production frontend deployments are triggered by Vercel GitHub integration."
