name: CapexCycleOS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Backend Node.js Tests
  backend-node-test:
    name: Backend Node.js Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json

      - name: Install dependencies
        working-directory: backend-node
        run: npm ci --legacy-peer-deps

      - name: Validate env vars
        working-directory: backend-node
        run: |
          echo "Checking required env vars are documented..."
          grep -q "JWT_SECRET" ../\.env.example || (echo "JWT_SECRET missing from .env.example" && exit 1)
          grep -q "DATABASE_URL" ../\.env.example || (echo "DATABASE_URL missing from .env.example" && exit 1)

      - name: Validate Prisma schema
        working-directory: backend-node
        run: npx prisma validate

      - name: Audit dependencies
        working-directory: backend-node
        run: npm audit --audit-level=high || true

      - name: Run linter
        working-directory: backend-node
        run: npm run lint || true

      - name: Run unit tests
        working-directory: backend-node
        run: npm run test
        env:
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run e2e tests
        working-directory: backend-node
        run: npm run test:e2e || true
        env:
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Build
        working-directory: backend-node
        run: npm run build
        env:
          JWT_SECRET: ci-build-secret-must-be-at-least-32-characters-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Audit dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Run linter
        working-directory: frontend
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # Rust Backend Tests
  backend-rust-test:
    name: Rust Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        working-directory: backend
        run: cargo test --release || true

      - name: Build
        working-directory: backend
        run: cargo build --release

  # Docker Build
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-node-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend-node
        uses: docker/build-push-action@v5
        with:
          context: ./backend-node
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend-node:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Deploy notification
        run: echo "Deploying to staging environment..."

      # Add your deployment steps here (e.g., kubectl, docker-compose, etc.)
      - name: Placeholder for deployment
        run: echo "Deployment would happen here"
