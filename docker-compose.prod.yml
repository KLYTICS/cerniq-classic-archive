services:
  postgres:
    image: postgres:15-alpine
    container_name: cerniq-db
    environment:
      POSTGRES_DB: cerniq
      POSTGRES_USER: cerniq
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "max_connections=100"
    # No host port exposure in production — internal Docker network only
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    networks:
      - cerniq
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerniq"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: cerniq-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    # No host port exposure in production — internal Docker network only
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - cerniq
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: always

  backend-node:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: cerniq-backend-node
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://cerniq:${DATABASE_PASSWORD}@postgres:5432/cerniq
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      # Auth — Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER}
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      # Billing — Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ONE_TIME: ${STRIPE_PRICE_ONE_TIME}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY}
      STRIPE_PRICE_ANNUAL: ${STRIPE_PRICE_ANNUAL}
      STRIPE_PRICE_PARTNER: ${STRIPE_PRICE_PARTNER}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}
      ERWIN_EMAIL: ${ERWIN_EMAIL}
      # Storage — Cloudflare R2
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:-cerniq-reports}
      # Security
      ADMIN_KEY: ${ADMIN_KEY}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
      HEALTH_DETAILS_PUBLIC: "false"
      ALLOW_DEMO_MOCKS: "false"
      AUTH_COOKIE_SECURE: "true"
      AUTH_COOKIE_SAMESITE: lax
      # URLs
      FRONTEND_URL: ${FRONTEND_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ALLOW_PREVIEW_ORIGINS: "false"
      # Market data
      YAHOO_FINANCE_API_KEY: ${YAHOO_FINANCE_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cerniq
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cerniq-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_NODE_API_URL: ${NEXT_PUBLIC_NODE_API_URL}
      NEXT_PUBLIC_SEGMENT_WRITE_KEY: ${NEXT_PUBLIC_SEGMENT_WRITE_KEY:-}
      NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${NEXT_PUBLIC_GA4_MEASUREMENT_ID:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
    ports:
      - "3001:3000"
    depends_on:
      - backend-node
    networks:
      - cerniq
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: always

volumes:
  postgres_data:
  redis_data:
  postgres_backups:

networks:
  cerniq:
    driver: bridge
